version: '3.8'

services:
  backend:
    build: ./backend
    container_name: blog-backend
    restart: unless-stopped
    environment:
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - DB_PATH=/app/data/blog.db
      - UPLOAD_DIR=/app/uploads
    volumes:
      - blog-data:/app/data
      - blog-uploads:/app/uploads
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: blog-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  blog-data:
  blog-uploads:
